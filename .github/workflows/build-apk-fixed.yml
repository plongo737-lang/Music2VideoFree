name: Build APK FIXED

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip "M2V (1).zip"

      - name: Fix Java regex error
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("music2video_android_cost_safe_studio/app/src/main/java/com/entilio/music2videofree/LyricsEngine.java")
          s = p.read_text()
          s = s.replace("\\-", "-")
          p.write_text(s)

          print("LyricsEngine.java corrigé")
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build APK
        working-directory: music2video_android_cost_safe_studio
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Music2VideoFree-debug-apk
          path: music2video_android_cost_safe_studio/app/build/outputs/apk/debug/*.apk
